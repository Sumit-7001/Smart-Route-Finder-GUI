<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Route Finder{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .nav-profile a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: var(--transition);
        }
        .nav-profile a:hover {
            color: var(--text-primary);
        }
        /* Root container for notifications */
        .fixed-notification-wrapper {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="siri-bg">
        <div class="siri-aura"></div>
        <div class="siri-orb orb-1"></div>
        <div class="siri-orb orb-2"></div>
        <div class="siri-orb orb-3"></div>
        <div class="siri-orb orb-4"></div>
        <div class="siri-glow"></div>
    </div>

    <!-- Notification Root -->
    <div id="notification-root" class="fixed-notification-wrapper"></div>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script>
        // Use the notification system for Flask flash messages
        document.addEventListener('DOMContentLoaded', () => {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        showNotification("{{ message }}", "{{ 'success' if category == 'message' or category == 'success' else 'error' }}");
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
